name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # 1. Ambil source code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install dependencies sistem
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip \
          build-essential autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      # 3. Install python tools
      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # 4. Bersihkan cache buildozer (biar tidak error SDK lama)
      - name: Clean build environment
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer

      # 5. Build APK
      - name: Build APK
        run: |
          yes | buildozer -v android debug

      # 6. Upload hasil APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
